name: Dependabot AGP Wrapper

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/libs.versions.toml"

permissions:
  contents: write

jobs:
  update-wrapper:
    if: >-
      ${{
        github.actor == 'dependabot[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'dependabot/gradle/android-gradle')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Detect required Gradle version
        id: gradle
        shell: bash
        run: |
          set -euo pipefail

          agp_version="$(awk -F '"' '/^agp[[:space:]]*=/{ print $2; exit }' gradle/libs.versions.toml)"
          current_gradle="$(sed -nE 's#^distributionUrl=.*gradle-([0-9.]+)-bin\.zip#\1#p' gradle/wrapper/gradle-wrapper.properties)"
          probe_dir="$(mktemp -d)"
          trap 'rm -rf "${probe_dir}"' EXIT

          cat > "${probe_dir}/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          EOF

          cat > "${probe_dir}/build.gradle.kts" <<EOF
          plugins {
              id("com.android.application") version "${agp_version}"
          }
          EOF

          output="$(./gradlew -p "${probe_dir}" help --no-daemon 2>&1 || true)"
          required_gradle="$(printf '%s\n' "${output}" | sed -nE 's/.*Minimum supported Gradle version is ([0-9.]+).*/\1/p' | head -n1)"

          if [[ -z "${required_gradle}" ]]; then
            echo "No wrapper update required for AGP ${agp_version}."
            echo "required=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if printf '%s\n%s\n' "${required_gradle}" "${current_gradle}" | sort -V -C; then
            echo "Gradle ${current_gradle} already satisfies AGP ${agp_version}."
            echo "required=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "AGP ${agp_version} requires Gradle ${required_gradle}."
          echo "required=${required_gradle}" >> "${GITHUB_OUTPUT}"

      - name: Update Gradle wrapper
        if: steps.gradle.outputs.required != ''
        run: |
          sed -i "s#gradle-[0-9.]*-bin.zip#gradle-${{ steps.gradle.outputs.required }}-bin.zip#" gradle/wrapper/gradle-wrapper.properties

      - name: Commit changes
        if: steps.gradle.outputs.required != ''
        run: |
          if git diff --quiet -- gradle/wrapper/gradle-wrapper.properties; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.properties
          git commit -m "build(deps): update Gradle wrapper"
          git push

      - name: Dispatch CI
        if: steps.gradle.outputs.required != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=dependabot-agp-wrapper-updated \
            -f "client_payload[ref]=${{ github.event.pull_request.head.ref }}"
